---
- name: testing
  hosts: windows
  gather_facts: true
  vars:
    test_path: "C:\\Tests"
    
  tasks:
    - name: Dump available task details
      ansible.builtin.debug:
        var: semaphore_vars.task_details
        
    - name: Create directories
      ansible.windows.win_file:
        path: "{{ test_path }}\\test01-{{ name_dir }}"
        state: directory
        
    - name: Update Version field in Semaphore UI database
      ansible.builtin.uri:
        url: "https://semaphore.brokeree.dev/api/project/1/tasks/{{ semaphore_vars.task_details.id }}"
        method: PUT
        headers:
          Authorization: "Bearer nxqnjrtjgkijz2_tbtghrhzzqp0_lddubjyheqwxug0="
          Content-Type: "application/json"
        body_format: json
        body:
          version: "{{ vtest }}"
      delegate_to: localhost
