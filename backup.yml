---
- name: Copy files to Windows Server
  hosts: windows
  gather_facts: false
  vars:
    backup_file: "{{ lookup('pipe','date +%Y-%m-%d') }}"
  tasks:
    - name: Create destination directory if it doesn't exist
      ansible.windows.win_file:
        path: C:\Brokeree\Brokeree.Social\_backup\{{ backup_file }}
        state: directory

    - name: Copy a local file to the Windows server
      ansible.windows.win_copy:
        src: "C:\\Brokeree\\Brokeree.Social\\API\\{{ item.source_file }}"
        dest: "C:\\Brokeree\\Brokeree.Social\\_backup\\{{ backup_file }}\\{{ item.backup_file }}"
        remote_src: true
      loop:
      - { source_file: 'SocialTrading.API.exe', backup_file: 'SocialTrading.API.exe' }
        - { source_file: 'mtmanapi64.dll', backup_file: 'mtmanapi64.dll' }
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }     
