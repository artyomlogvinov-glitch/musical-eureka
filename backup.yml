---
- name: Social Backup
  hosts: windows
  gather_facts: false
  vars:
    # Social Configuration
    backup_file: "{{ lookup('pipe','date +%Y-%m-%d') }}"
    social_path: 'C:\Brokeree\Brokeree.Social'
    social_path2: 'C:\Brokeree\Brokeree.Social-2'
    # MySQL Configuration
    mysql_user: "Admin"
    mysql_password: "BrokereeAdmin"
    mysql_db_name: "social_trading"
    mysql_bin_path: 'C:\Program Files\MySQL\MySQL Server 8.4\bin'
    # Social Services
    services:
      - Brokeree.Social.API
      - Brokeree.Social.Ratings
    #  - Brokeree.Social.Worker
    #TeamCity
    target_branch: "support/5.x"
    tc_server: "https://teamcity.brokeree.dev"
    tc_build_type_id: "SocialPlatform"
    tc_token: "eyJ0eXAiOiAiVENWMiJ9.bk9YX3RsWnVudS1GQjFxeU5KNFVyQm9tV1Js.NTdiZDRjY2UtNzkxNC00YzFjLWE3ODUtYWNlYTkzMTI2OTVh"
  tasks:
    - name: Create backup directories
      ansible.windows.win_file:
        path: "{{ social_path }}\\_backup\\{{ backup_file }}\\{{ item.social_file }}"
        state: directory
      loop:
        - { social_file: "API" }
        - { social_file: "Ratings" }
        - { social_file: "Worker" }
        
    - name: Copy Social API files
      ansible.windows.win_copy:
        src: "{{ social_path }}\\API\\{{ item.source_file }}"
        dest: "{{ social_path }}\\_backup\\{{ backup_file }}\\API"
        remote_src: true
      loop:
        - { source_file: 'templates', backup_file: '' }
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }
        - { source_file: 'SocialTrading.API.exe', backup_file: 'SocialTrading.API.exe' }
        - { source_file: 'wwwadmin.zip', backup_file: 'wwwadmin.zip' }
        - { source_file: 'wwwuser.zip', backup_file: 'wwwuser.zip' }
        - { source_file: 'wwwwidgets.zip', backup_file: 'wwwwidgets.zip' } 
        
    - name: Copy Social Ratings files
      ansible.windows.win_copy:
        src: "{{ social_path }}\\Ratings\\{{ item.source_file }}"
        dest: "{{ social_path }}\\_backup\\{{ backup_file }}\\Ratings"
        remote_src: true
      loop:
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }
        - { source_file: 'SocialTrading.Ratings.exe', backup_file: 'SocialTrading.Ratings.exe' }
        - { source_file: 'wwwcomponents.zip', backup_file: 'wwwcomponents.zip' }
        - { source_file: 'wwwroot.zip', backup_file: 'wwwroot.zip' }
        - { source_file: 'wwwwidgets.zip', backup_file: 'wwwwidgets.zip' }

#    - name: Copy Social Worker files
#      ansible.windows.win_copy:
#        src: "{{ social_path }}\\Worker\\{{ item.source_file }}"
#        dest: "{{ social_path }}\\_backup\\{{ backup_file }}\\Worker"
#        remote_src: true
#      loop:
#        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
#        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
#        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }

    - name: Creating MySQL backup
      ansible.windows.win_powershell:
        script: |
          # Generate a safe timestamp (e.g., 2026-07-08_13-20)
          $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm"
          $backupFile = "{{ social_path }}\_backup\{{ backup_file }}\{{ mysql_db_name }}_$timestamp.sql"
          
          # Navigate to MySQL bin directory
          cd "{{ mysql_bin_path }}"
          
          # Execute mysqldump
          ./mysqldump.exe --user="{{ mysql_user }}" --password="{{ mysql_password }}" {{ mysql_db_name }} --result-file=$backupFile
          
          # Verify file was created and isn't empty
          if (Test-Path $backupFile) {
              $size = (Get-Item $backupFile).Length
              return @{ backup_path = $backupFile; size_bytes = $size; success = $true }
          } else {
              throw "Mysqldump failed to create the backup file."
          }
      register: mysql_backup_result

    - name: Stop Social Services
      ansible.windows.win_service:
        name: "{{ item }}"
        state: stopped
        start_mode: manual
      loop: "{{ services }}"

    - name: Create update directories
      ansible.windows.win_file:
        path: "{{ social_path }}\\_update\\{{ backup_file }}"
        state: directory

    - name: Query TeamCity for the artifact file list of Build ID {{ latest_build_id }}
      ansible.builtin.uri:
        url: "{{ tc_server }}/app/rest/builds/id:{{ latest_build_id }}/artifacts/children"
        method: GET
        headers:
          Accept: "application/json"
          Authorization: "Bearer {{ tc_token }}"
        status_code: 200
      register: tc_artifacts_response
      delegate_to: localhost

    - name: Download branch-specific artifact from TeamCity
      ansible.builtin.get_url:
        # We use TeamCity's locator syntax to grab the latest successful build from a specific branch
        url: "{{ tc_server }}/repository/download/{{ tc_build_type_id }}/.latestSuccessful/{{ artifact_name }}?locator=branch:{{ target_branch }}"
        url_username: "oauth2"
        url_password: "{{ tc_token }}"
        dest: "/tmp/app_payload.zip"
      delegate_to: localhost

    - name: Extract the branch artifact onto the Windows Server
      community.windows.win_unzip:
        src: "/tmp/app_payload.zip"
        dest: "{{ social_path2 }}"
        rm: true
      
    - name: Starting Social Services
      ansible.windows.win_service:
        name: "{{ item }}"
        state: running
        start_mode: delayed
      loop: "{{ services }}"
