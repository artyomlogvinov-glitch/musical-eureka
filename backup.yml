---
- name: Copy files to Windows Server
  hosts: windows
  gather_facts: false
  vars:
    backup_file: "{{ lookup('pipe','date +%Y-%m-%d') }}"
  tasks:
    - name: Create backup directories
      ansible.windows.win_file:
        path: C:\Brokeree\Brokeree.Social\_backup\{{ backup_file }}\{{ item.social_file }}
        state: directory
      loop:
        - { social_file: "API" }
        - { social_file: "Ratings" }
        - { social_file: "Worker" }

    - name: Copy Social API files - Checking
      ansible.windows.win_stat:
        path: "C:\\Brokeree\\Brokeree.Social\\API"
      register: API_file_data

    - name: Copy Social API files - Coping
      ansible.windows.win_copy:
        src: "C:\\Brokeree\\Brokeree.Social\\API\\{{ item.source_file }}"
        dest: "C:\\Brokeree\\Brokeree.Social\\_backup\\{{ backup_file }}\\API"
        remote_src: true
        when: API_file_data.stat.exists
      loop:
        - { source_file: 'templates', backup_file: '' }
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }
        - { source_file: 'SocialTrading.API.exe', backup_file: 'SocialTrading.API.exe' }
        - { source_file: 'wwwadmin.zip', backup_file: 'wwwadmin.zip' }
        - { source_file: 'wwwuser.zip', backup_file: 'wwwuser.zip' }
        - { source_file: 'wwwwidgets.zip', backup_file: 'wwwwidgets.zip' } 

    - name: Copy Social Ratings files - Checking
      ansible.windows.win_stat:
        path: "C:\\Brokeree\\Brokeree.Social\\Ratings"
      register: Ratings_file_data

    - name: Copy Social Ratings files - Coping
      ansible.windows.win_copy:
        src: "C:\\Brokeree\\Brokeree.Social\\Ratings\\{{ item.source_file }}"
        dest: "C:\\Brokeree\\Brokeree.Social\\_backup\\{{ backup_file }}\\Ratings"
        remote_src: true
        when: Ratings_file_data.stat.exists
      loop:
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }
        - { source_file: 'SocialTrading.Ratings.exe', backup_file: 'SocialTrading.Ratings.exe' }
        - { source_file: 'wwwcomponents.zip', backup_file: 'wwwcomponents.zip' }
        - { source_file: 'wwwroot.zip', backup_file: 'wwwroot.zip' }
        - { source_file: 'wwwwidgets.zip', backup_file: 'wwwwidgets.zip' }

    - name: Copy Social Worker files - Checking
      ansible.windows.win_stat:
        path: "C:\\Brokeree\\Brokeree.Social\\Worker"
      register: Worker_file_data

    - name: Copy Social Worker files - Coping
      ansible.windows.win_copy:
        src: "C:\\Brokeree\\Brokeree.Social\\Worker\\{{ item.source_file }}"
        dest: "C:\\Brokeree\\Brokeree.Social\\_backup\\{{ backup_file }}\\Worker"
        remote_src: true
        when: Worker_file_data.stat.exists
      loop:
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }
        - { source_file: 'MT5APIManager64.dll', backup_file: 'MT5APIManager64.dll' }
        - { source_file: 'NLog.config', backup_file: 'MNLog.config' }
        - { source_file: 'SocialTrading.Worker.exe', backup_file: 'SocialTrading.Worker.exe' }  
