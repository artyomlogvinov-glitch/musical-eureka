---
- name: Copy files to Windows Server
  hosts: windows
  gather_facts: false
  vars:
    backup_file: "{{ lookup('pipe','date +%Y-%m-%d') }}"
  tasks:
    - name: Create destination directory if it doesn't exist
      ansible.windows.win_file:
        path: C:\Brokeree\Brokeree.Social\_backup\{{ backup_file }}
        state: directory

    - name: Copy a local file to the Windows server
      ansible.windows.win_copy:
        src: "C:\Brokeree\Brokeree.Social\API\{{ item.source }}"
        dest: "C:\Brokeree\Brokeree.Social\_backup\{{ backup_file }}\{{ item.copy }}"
        remote_src: true
      loop:
        - { source: 'SocialTrading.API.exe', copy: 'SocialTrading.API.exe' }
        - { source: 'mtmanapi64.dll', copy: 'mtmanapi64.dll' }
        - { source: 'ijwhost.dll', copy: 'ijwhost.dll' }     
