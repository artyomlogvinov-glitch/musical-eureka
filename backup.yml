---
- name: Copy files to Windows Server
  hosts: windows
  gather_facts: false
  vars:
    backup_file: "{{ lookup('pipe','date +%Y-%m-%d') }}"
  tasks:
    - name: Create backup directory
      ansible.windows.win_file:
        path: C:\Brokeree\Brokeree.Social\_backup\{{ backup_file }}\{{ item.social_file }}
        state: directory
      loop:
        - { social_file: "API" }
        - { social_file: "Ratings" }
        - { social_file: "Worker" }

    - name: Copy Social API Backup
      ansible.windows.win_copy:
        src: "C:\\Brokeree\\Brokeree.Social\\{{ item.source_file }}"
        dest: "C:\\Brokeree\\Brokeree.Social\\_backup\\{{ backup_file }}\\{{ item.backup_file }}"
        remote_src: true
      loop:
        - { source_file: 'API\SocialTrading.API.exe', backup_file: 'API\SocialTrading.API.exe' }
        - { source_file: 'mtmanapi64.dll', backup_file: 'mtmanapi64.dll' }
        - { source_file: 'ijwhost.dll', backup_file: 'ijwhost.dll' }     
